<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link rel="stylesheet" href="amin.css">
</head>
<body>
<div class="dashboard">
    <h1>Admin Dashboard</h1>
    <button id="logoutBtn">Logout</button>

    <!-- Logged-in Users -->
    <h2>Logged-in Users</h2>
    <table id="loggedInUsers">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Last Login</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Forgot Password Requests -->
    <h2>Forgot Password Requests</h2>
    <table id="forgotRequests">
        <thead>
            <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Request Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Upload Study Material -->
    <h2>Upload Study Material</h2>
    <form id="uploadForm">
        <label for="subject">Subject:</label>
        <select id="subject" name="subject" required>
            <option value="">Select Subject</option>
            <option value="Maths">Maths</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
        </select>

        <label for="chapter">Chapter:</label>
        <input type="text" id="chapter" name="chapter" placeholder="Chapter Name" required>

        <label for="type">Type:</label>
      <select name="type" id="type" required>
    <option value="Worksheet">Worksheet</option>
    <option value="Question Paper">Question Paper</option>
    <option value="NCERT Solution">NCERT Solution</option>
</select>

        <label for="file">File:</label>
        <input type="file" id="file" name="file" required>

        <button type="submit">Upload</button>
    </form>

    <!-- Uploaded Materials -->
    <h2>Uploaded Materials</h2>
    <table id="materialsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Subject</th>
                <th>Chapter</th>
                <th>Type</th>
                <th>File</th>
                <th>Uploaded At</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="admin.js"></script>
</body>
</html>
